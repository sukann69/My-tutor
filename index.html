<!DOCTYPE html>
<html>

<head>
  <title>My Tutor App</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6fb;
      color: #111;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #3730a3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #4f46e5;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .box {
      background: #f8f9ff;
      padding: 10px;
      margin: 6px 0;
      border-left: 5px solid #4f46e5;
      border-radius: 10px;
      font-size: 14px;
    }

    #total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">📚 My Tutor App</div>

<div class="container">

  <!-- ➕ INPUT -->
  <div class="card">
    <h3>➕ เพิ่มข้อมูล</h3>

    <select id="month" onchange="render()">
      <option value="Jan">มกราคม</option>
      <option value="Feb">กุมภาพันธ์</option>
      <option value="Mar">มีนาคม</option>
      <option value="Apr">เมษายน</option>
      <option value="May">พฤษภาคม</option>
      <option value="Jun">มิถุนายน</option>
      <option value="Jul">กรกฎาคม</option>
      <option value="Aug">สิงหาคม</option>
      <option value="Sep">กันยายน</option>
      <option value="Oct">ตุลาคม</option>
      <option value="Nov">พฤศจิกายน</option>
      <option value="Dec">ธันวาคม</option>
    </select>

    <input id="date" type="number" placeholder="วันที่">
    <input id="name" placeholder="ชื่อนักเรียน">
    <input id="hours" type="number" placeholder="ชั่วโมง">

    <button onclick="addData()">เพิ่มข้อมูล</button>

    <button onclick="exportImage()">📸 Export รูป</button>
  </div>

  <!-- 📋 TABLE -->
  <div class="card">
    <h3>📋 ตาราง</h3>

    <div id="captureArea">
      <table>
        <thead>
          <tr>
            <th>วันที่</th>
            <th>ชื่อ</th>
            <th>ชม.</th>
            <th>เงิน</th>
            <th>จัดการ</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>

      <h3 id="total"></h3>
    </div>
  </div>

  <!-- 📊 SUMMARY -->
  <div class="card">
    <h3>📊 รายได้รายเดือน</h3>
    <div id="monthSummary"></div>
  </div>

  <div class="card">
    <h3>👨‍🎓 รายได้ตามนักเรียน</h3>
    <div id="studentSummary"></div>
  </div>

</div>

<script>
const rate = 150;

// 📦 stable data
let data = JSON.parse(localStorage.getItem("tutorData"));

if (!data || typeof data !== "object" || Array.isArray(data)) {
  data = {
    Jan: [], Feb: [], Mar: [], Apr: [],
    May: [], Jun: [], Jul: [], Aug: [],
    Sep: [], Oct: [], Nov: [], Dec: []
  };
  saveData();
}

function saveData() {
  localStorage.setItem("tutorData", JSON.stringify(data));
}

// ➕ add
function addData() {
  let month = document.getElementById("month").value;
  let date = document.getElementById("date").value;
  let name = document.getElementById("name").value;
  let hours = Number(document.getElementById("hours").value);

  if (!date || !name || !hours) {
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  data[month].push({ date, name, hours });

  saveData();
  render();
}

// 🗑 delete
function deleteItem(month, index) {
  data[month].splice(index, 1);
  saveData();
  render();
}

// ✏️ edit
function editHours(month, index) {
  let newHours = prompt("แก้ชั่วโมง:", data[month][index].hours);

  if (newHours !== null && newHours !== "") {
    data[month][index].hours = Number(newHours);

    saveData();
    render();
  }
}

// 📋 render
function render() {
  let month = document.getElementById("month").value;

  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  let total = 0;

  data[month].forEach((d, index) => {
    let money = d.hours * rate;
    total += money;

    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.name}</td>
        <td>${d.hours}</td>
        <td>${money}</td>
        <td>
          <button onclick="editHours('${month}', ${index})">แก้</button>
          <button onclick="deleteItem('${month}', ${index})">ลบ</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("total").innerText =
    "💰 รวมเดือนนี้: " + total + " บาท";

  renderMonthSummary();
  renderStudentSummary();
}

// 📊 เดือน
function renderMonthSummary() {
  let months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let html = "";

  months.forEach(m => {
    let sum = 0;

    data[m].forEach(d => {
      sum += d.hours * rate;
    });

    html += `<div class="box">📅 ${m}: ${sum} บาท</div>`;
  });

  document.getElementById("monthSummary").innerHTML = html;
}

// 👨‍🎓 เด็ก
function renderStudentSummary() {
  let students = {};

  Object.keys(data).forEach(month => {
    data[month].forEach(d => {
      let money = d.hours * rate;

      if (!students[d.name]) students[d.name] = 0;

      students[d.name] += money;
    });
  });

  let html = "";

  for (let name in students) {
    html += `<div class="box">👨‍🎓 ${name}: ${students[name]} บาท</div>`;
  }

  document.getElementById("studentSummary").innerHTML = html;
}

// 📸 export
function exportImage() {
  html2canvas(document.getElementById("captureArea")).then(canvas => {
    let link = document.createElement("a");
    link.download = "my-tutor-report.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

// 🚀 start
render();
</script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
